{{/* Share post links */}}
{{ $title := .Title | urlquery }}
{{ $url := .Permalink | urlquery }}
<div class="post-share">
  <p class="post-share-text">Enjoyed this? Share it</p>
  <div class="post-share-links">
    <a href="https://x.com/intent/tweet?text={{ $title }}&url={{ $url }}" target="_blank" rel="noopener noreferrer" class="post-share-link" aria-label="Share on X" title="Share on X">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16" aria-hidden="true" focusable="false"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
    </a>
    <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ $url }}" target="_blank" rel="noopener noreferrer" class="post-share-link" aria-label="Share on LinkedIn" title="Share on LinkedIn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16" aria-hidden="true" focusable="false"><path d="M20.5 2h-17A1.5 1.5 0 002 3.5v17A1.5 1.5 0 003.5 22h17a1.5 1.5 0 001.5-1.5v-17A1.5 1.5 0 0020.5 2zM8 19H5v-9h3zM6.5 8.25A1.75 1.75 0 118.3 6.5a1.78 1.78 0 01-1.8 1.75zM19 19h-3v-4.74c0-1.42-.6-1.93-1.38-1.93A1.74 1.74 0 0013 14.19a.66.66 0 000 .14V19h-3v-9h2.9v1.3a3.11 3.11 0 012.7-1.4c1.55 0 3.36.86 3.36 3.66z"/></svg>
    </a>
    <a href="https://www.reddit.com/submit?url={{ $url }}&title={{ $title }}" target="_blank" rel="noopener noreferrer" class="post-share-link" aria-label="Share on Reddit" title="Share on Reddit">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16" aria-hidden="true" focusable="false"><path d="M12 0A12 12 0 000 12a12 12 0 0012 12 12 12 0 0012-12A12 12 0 0012 0zm5.01 4.744c.688 0 1.25.561 1.25 1.249a1.25 1.25 0 01-2.498.056l-2.597-.547-.8 3.747c1.824.07 3.48.632 4.674 1.488.308-.309.73-.491 1.207-.491.968 0 1.754.786 1.754 1.754 0 .716-.435 1.333-1.01 1.614a3.111 3.111 0 01.042.52c0 2.694-3.13 4.87-7.004 4.87-3.874 0-7.004-2.176-7.004-4.87 0-.183.015-.366.043-.534A1.748 1.748 0 014.028 12c0-.968.786-1.754 1.754-1.754.463 0 .898.196 1.207.49 1.207-.883 2.878-1.43 4.744-1.487l.885-4.182a.342.342 0 01.14-.197.35.35 0 01.238-.042l2.906.617a1.214 1.214 0 011.108-.701zM9.25 12C8.561 12 8 12.562 8 13.25c0 .687.561 1.248 1.25 1.248.687 0 1.248-.561 1.248-1.249 0-.688-.561-1.249-1.249-1.249zm5.5 0c-.687 0-1.248.561-1.248 1.25 0 .687.561 1.248 1.249 1.248.688 0 1.249-.561 1.249-1.249 0-.687-.562-1.249-1.25-1.249zm-5.466 3.99a.327.327 0 00-.231.094.33.33 0 000 .463c.842.842 2.484.913 2.961.913.477 0 2.105-.056 2.961-.913a.361.361 0 00.029-.463.33.33 0 00-.464 0c-.547.533-1.684.73-2.512.73-.828 0-1.979-.196-2.512-.73a.326.326 0 00-.232-.095z"/></svg>
    </a>
    <a href="https://news.ycombinator.com/submitlink?u={{ $url }}&t={{ $title }}" target="_blank" rel="noopener noreferrer" class="post-share-link" aria-label="Share on Hacker News" title="Share on Hacker News">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16" aria-hidden="true" focusable="false"><path d="M0 24V0h24v24H0zM6.951 5.896l4.112 7.708v5.064h1.583v-4.972l4.148-7.799h-1.749l-2.457 4.875c-.372.745-.688 1.434-.688 1.434s-.297-.708-.651-1.434L8.831 5.896h-1.88z"/></svg>
    </a>
  </div>
</div>

{{- if site.Params.giscus }}
<script src="https://giscus.app/client.js"
  data-repo="{{ site.Params.giscus.repo }}"
  data-repo-id="{{ site.Params.giscus.repoId }}"
  data-category="{{ site.Params.giscus.category }}"
  data-category-id="{{ site.Params.giscus.categoryId }}"
  data-mapping="{{ site.Params.giscus.mapping | default "pathname" }}"
  data-strict="0"
  data-reactions-enabled="{{ site.Params.giscus.reactionsEnabled | default "1" }}"
  data-emit-metadata="{{ site.Params.giscus.emitMetadata | default "0" }}"
  data-input-position="{{ site.Params.giscus.inputPosition | default "top" }}"
  data-theme="{{ site.Params.giscus.theme | default "preferred_color_scheme" }}"
  data-lang="{{ site.Params.giscus.lang | default "en" }}"
  data-loading="lazy"
  crossorigin="anonymous"
  async>
</script>
{{- end }}
