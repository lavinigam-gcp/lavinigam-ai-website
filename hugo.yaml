baseURL: "https://lavinigam.com"
languageCode: en-us
title: Lavi Nigam
copyright: "[Lavi Nigam](/about/)"
theme: PaperMod

# Pagination
pagination:
  pagerSize: 5

# Enable emoji support
enableEmoji: true

# Enable robots.txt generation
enableRobotsTXT: true

# Build settings
buildDrafts: false
buildFuture: false
buildExpired: false

# Minify output
minify:
  disableXML: true

# Output formats
outputs:
  home:
    - HTML
    - RSS
    - JSON

# PaperMod Parameters
params:
  env: production
  description: "Personal website and blog"
  author: Lavi Nigam
  comments: true

  # Giscus comments (GitHub Discussions)
  giscus:
    repo: "lavinigam-gcp/lavinigam-ai-website"
    repoId: "R_kgDOQNKCrQ"
    category: "Announcements"
    categoryId: "DIC_kwDOQNKCrc4C3mpe"
    mapping: "pathname"
    reactionsEnabled: "1"
    emitMetadata: "0"
    inputPosition: "top"
    theme: "preferred_color_scheme"
    lang: "en"

  # Date format
  DateFormat: "January 2, 2006"

  # Show "Reading Time"
  ShowReadingTime: true

  # Show "Share" buttons
  ShowShareButtons: false

  # Show post navigation links
  ShowPostNavLinks: true

  # Show breadcrumbs
  ShowBreadCrumbs: true

  # Show code copy buttons
  ShowCodeCopyButtons: true

  # Show word count
  ShowWordCount: true

  # Show RSS button in menu
  ShowRssButtonInSectionTermList: true

  # Use Hugo's syntax highlighter
  UseHugoToc: true

  # Table of Contents — enabled globally, individual posts can override with showToc: false
  ShowToc: true
  TocOpen: false

  # Display full text in RSS
  ShowFullTextinRSS: true

  # Social accounts (used by Twitter Cards, etc.)
  social:
    twitter: _theagentguy_

  # Edit post link
  editPost:
    URL: "https://github.com/lavinigam-gcp/lavinigam-ai-website/tree/main/content"
    Text: "Suggest Changes"
    appendFilePath: true

# Menu configuration
menu:
  main:
    - identifier: blog
      name: Blog
      url: /posts/
      weight: 10
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20
    - identifier: talks
      name: Talks
      url: /talks/
      weight: 30
    - identifier: search
      name: Search
      url: /search/
      weight: 40
    - identifier: about
      name: About
      url: /about/
      weight: 50

# Taxonomies
taxonomies:
  category: categories
  tag: tags
  series: series

# Privacy settings
privacy:
  disqus:
    disable: true
  googleAnalytics:
    disable: false
    anonymizeIP: true
    respectDoNotTrack: true
  instagram:
    disable: true
  x:
    disable: false
    enableDNT: true
  vimeo:
    disable: true
  youtube:
    privacyEnhanced: true

services:
  googleAnalytics:
    ID: G-T3N1WT63CL

# Markup configuration
markup:
  tableOfContents:
    startLevel: 2
    endLevel: 4
    ordered: false
  goldmark:
    renderer:
      unsafe: true
  highlight:
    anchorLineNos: false
    codeFences: true
    guessSyntax: false
    lineNos: false
    noClasses: false
    style: monokai
